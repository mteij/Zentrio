[build]
  command = "bun run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "bun run dev"

# Route /download/:platform to the function via query param
[[redirects]]
  from = "/download/*"
  to = "/.netlify/functions/download?platform=:splat"
  status = 200

# SPA fallback - all other routes go to index.html
# Note: static files in dist/ (sitemap.xml, robots.txt, etc.) are served directly by Netlify before this rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200