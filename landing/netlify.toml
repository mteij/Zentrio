[build]
  command = "bun run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "bun run dev"

# Route /download/:platform to the function via query param
[[redirects]]
  from = "/download/:platform"
  to = "/.netlify/functions/download/:platform"
  status = 302

[[redirects]]
  from = "/updater"
  to = "/.netlify/functions/updater"
  status = 200

# SPA fallback - all other routes go to index.html
# Note: static files in dist/ (sitemap.xml, robots.txt, etc.) are served directly by Netlify before this rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
