name: Build Tauri App

on:
  repository_dispatch:
    types: [tauri-build]
  workflow_call:
    inputs:
      version:
        description: "Version to build (optional, defaults to package.json)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (optional, defaults to package.json)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # First, ensure the release exists before any builds start
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_id: ${{ steps.get_release_id.outputs.release_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -e "console.log(require('./app/package.json').version)")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # Check if release exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "✅ Release $TAG already exists"
          else
            echo "❌ Release $TAG does not exist."
            echo "This workflow should be triggered by release.yml which creates the release first."
            echo "If running manually, ensure the release tag v$VERSION exists."
            exit 1
          fi

      - name: Ensure latest flag and pre-release flag for 0.x.x versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$MAJOR" = "0" ]; then
            echo "📦 Version $VERSION is 0.x.x — ensuring release is marked as pre-release and latest"
            gh release edit "v$VERSION" --prerelease --latest
          else
            gh release edit "v$VERSION" --latest
          fi

      - name: Get Release ID
        id: get_release_id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          RELEASE_ID=$(gh release view "$TAG" --json databaseId -q .databaseId)
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "Got Release ID: $RELEASE_ID"

  build-tauri:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          # iOS build temporarily disabled - requires Apple Developer account with code signing
          # To enable: Set up APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_PROVISIONING_PROFILE secrets
          # - platform: "macos-latest"
          #   args: "--target aarch64-apple-ios"
          #   name: "ios"
          - platform: "macos-latest" # Apple Silicon runner for macOS
            args: "--target aarch64-apple-darwin"
            name: "macos"
          - platform: "ubuntu-22.04" # for Linux
            # AppImage bundling is currently failing in GitHub Actions during the
            # upstream linuxdeploy step, even after the app binary, deb, and rpm
            # are built successfully. Limit CI Linux bundles to the stable
            # package formats so desktop releases stay green.
            # createUpdaterArtifacts is disabled here because Linux deb/rpm bundles
            # do not use the Tauri updater and passing an empty signing key causes
            # "Missing comment in secret key" even when the env var is set to ''.
            args: "--bundles deb,rpm --config '{\"bundle\":{\"createUpdaterArtifacts\":false}}'"
            name: "linux"
          - platform: "windows-latest" # for Windows
            args: ""
            name: "windows"
          - platform: "ubuntu-22.04" # for Android
            args: "--target aarch64-linux-android"
            name: "android"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.create-release.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.name == 'android' && 'aarch64-linux-android' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        # Dependencies per Tauri v2 docs + additional tools for linuxdeploy
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev libfuse2 file wget curl patchelf desktop-file-utils appstream squashfs-tools zsync

      - name: Setup Java (Android only)
        if: matrix.name == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK (Android only)
        if: matrix.name == 'android'
        uses: android-actions/setup-android@v3

      - name: Install NDK (Android only)
        if: matrix.name == 'android'
        run: sdkmanager "ndk;26.1.10909125"

      - name: Configure Android NDK environment
        id: ndk_config
        if: matrix.name == 'android'
        run: |
          ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.1.10909125"
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "$NDK_TOOLCHAIN" >> $GITHUB_PATH
          echo "ndk_home=$ANDROID_NDK_HOME" >> $GITHUB_OUTPUT

          # Set the compilers directly to the specific API level binaries
          echo "CC_aarch64_linux_android=$NDK_TOOLCHAIN/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$NDK_TOOLCHAIN/aarch64-linux-android24-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK_TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_TOOLCHAIN/aarch64-linux-android24-clang" >> $GITHUB_ENV
          
          # Force openssl-sys to use the vendored feature instead of failing on pkg-config cross-compilation
          echo "OPENSSL_NO_PKG_CONFIG=1" >> $GITHUB_ENV

      - name: Setup Gradle cache (Android only)
        if: matrix.name == 'android'
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install frontend dependencies
        working-directory: ./app
        run: bun install

      - name: Sync versions
        working-directory: ./app
        run: bun run sync

      # Server Binary Builds
      - name: Build Server Binary (Linux host)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: ./app
        run: |
          bun build src/index.ts --compile --target bun-linux-x64 --outfile src-tauri/bin/zentrio-server-x86_64-unknown-linux-gnu

      - name: Build Server Binary (Windows)
        if: matrix.name == 'windows'
        working-directory: ./app
        run: |
          bun build src/index.ts --compile --target bun-windows-x64 --outfile src-tauri/bin/zentrio-server-x86_64-pc-windows-msvc.exe

      - name: Build Server Binary (macOS)
        if: matrix.name == 'macos'
        working-directory: ./app
        run: |
          bun build src/index.ts --compile --target bun-darwin-arm64 --outfile src-tauri/bin/zentrio-server-aarch64-apple-darwin

      # Desktop Build (Linux, Windows, macOS Desktop)
      - name: Validate Tauri updater signing key
        id: validate_tauri_signing
        if: matrix.name != 'android' && matrix.name != 'ios' && matrix.name != 'linux'
        shell: bash
        continue-on-error: true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'NODE'
          const key = (process.env.TAURI_SIGNING_PRIVATE_KEY || "").trim();
          const fs = require("fs");

          const setOutput = (name, value) => {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`);
          };

          if (!key) {
            console.error("TAURI_SIGNING_PRIVATE_KEY is empty. Desktop updater artifacts cannot be signed.");
            setOutput("signing_available", "false");
            process.exit(1);
          }

          if (key.startsWith("untrusted comment:")) {
            console.error("TAURI_SIGNING_PRIVATE_KEY appears to be the decoded minisign key.");
            console.error("Store the exact one-line base64 contents of the generated .key file instead.");
            setOutput("signing_available", "false");
            process.exit(1);
          }

          if (/\s/.test(key)) {
            console.error("TAURI_SIGNING_PRIVATE_KEY contains whitespace.");
            console.error("Paste the .key file contents as a single uninterrupted base64 string.");
            setOutput("signing_available", "false");
            process.exit(1);
          }

          if (!/^[A-Za-z0-9+/=]+$/.test(key)) {
            console.error("TAURI_SIGNING_PRIVATE_KEY contains characters that are not valid base64.");
            setOutput("signing_available", "false");
            process.exit(1);
          }

          const decoded = Buffer.from(key, "base64").toString("utf8");
          if (!decoded.startsWith("untrusted comment: rsign encrypted secret key")) {
            console.error("TAURI_SIGNING_PRIVATE_KEY decoded successfully, but it does not look like a Tauri updater private key.");
            setOutput("signing_available", "false");
            process.exit(1);
          }

          setOutput("signing_available", "true");
          console.log("TAURI_SIGNING_PRIVATE_KEY format looks valid.");
          NODE

      - name: Build Tauri App (Desktop)
        id: build_tauri_desktop
        if: matrix.name != 'android' && matrix.name != 'ios'
        continue-on-error: ${{ matrix.name != 'linux' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ matrix.name != 'linux' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ matrix.name != 'linux' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          NO_STRIP: 1
        with:
          projectPath: ./app
          tagName: ${{ needs.create-release.outputs.tag_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Warn about desktop signing fallback
        if: matrix.name != 'android' && matrix.name != 'ios' && matrix.name != 'linux' && (steps.validate_tauri_signing.outcome == 'failure' || steps.build_tauri_desktop.outcome == 'failure')
        shell: bash
        run: |
          echo "::warning::Desktop updater signing failed for ${{ matrix.name }}. CI will retry without updater artifacts and will publish unsigned desktop bundles only."
          {
            echo "## Desktop signing fallback"
            echo ""
            echo "- Platform: \`${{ matrix.name }}\`"
            echo "- Signed updater artifacts: unavailable"
            echo "- Fallback: rebuilding desktop bundles without updater artifacts/signatures"
            echo "- Impact: release continues, but automatic updater packages are not published for this platform"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Tauri App (Desktop fallback without updater signing)
        id: build_tauri_desktop_fallback
        if: matrix.name != 'android' && matrix.name != 'ios' && matrix.name != 'linux' && (steps.validate_tauri_signing.outcome == 'failure' || steps.build_tauri_desktop.outcome == 'failure')
        working-directory: ./app
        shell: bash
        run: |
          bun run tauri build ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload unsigned desktop artifacts to Release
        if: matrix.name != 'android' && matrix.name != 'ios' && matrix.name != 'linux' && steps.build_tauri_desktop_fallback.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          fail_on_unmatched_files: false
          files: |
            app/src-tauri/target/*/release/bundle/dmg/*.dmg
            app/src-tauri/target/*/release/bundle/nsis/*.exe
            app/src-tauri/target/*/release/bundle/msi/*.msi

      - name: Fail if desktop fallback build also failed
        if: matrix.name != 'android' && matrix.name != 'ios' && matrix.name != 'linux' && (steps.validate_tauri_signing.outcome == 'failure' || steps.build_tauri_desktop.outcome == 'failure') && steps.build_tauri_desktop_fallback.outcome == 'failure'
        shell: bash
        run: |
          echo "Fallback desktop build failed after updater signing failed." >&2
          exit 1

      # Server Binary Build (Android)
      - name: Build Server Binary (Android)
        if: matrix.name == 'android'
        working-directory: ./app
        run: |
          mkdir -p src-tauri/bin
          # Bun has no Android compile target; the sidecar is desktop-only
          # (#[cfg(all(desktop, not(debug_assertions)))]), so a minimal stub satisfies
          # Tauri's build-time resource existence check without affecting runtime.
          CLANG="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          printf 'int main(){return 0;}' | "$CLANG" -x c - -o src-tauri/bin/zentrio-server-aarch64-linux-android

      # Android Build
      - name: Build Android
        if: matrix.name == 'android'
        working-directory: ./app
        env:
          NDK_HOME: ${{ steps.ndk_config.outputs.ndk_home }}
          ANDROID_NDK_HOME: ${{ steps.ndk_config.outputs.ndk_home }}
        run: |
          # Decode keystore from base64
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          KEYSTORE_PATH="$(pwd)/keystore.jks"

          # This repo checks in src-tauri/gen/android because it contains custom
          # Android sources, Gradle config, and ProGuard rules required at runtime.
          # Re-initializing here replaces them with Tauri defaults, which can build
          # successfully but crash immediately on launch.
          REQUIRED_ANDROID_FILES=(
            "src-tauri/gen/android/app/build.gradle.kts"
            "src-tauri/gen/android/app/proguard-rules.pro"
            "src-tauri/gen/android/app/src/main/java/com/zentrio/mteij/MainActivity.kt"
            "src-tauri/gen/android/app/src/main/java/com/zentrio/mteij/ExoPlayerPlugin.kt"
            "src-tauri/gen/android/app/src/main/java/com/zentrio/mteij/TvLauncherPlugin.kt"
            "src-tauri/gen/android/app/src/main/java/com/zentrio/mteij/ImmersiveModePlugin.kt"
          )

          for required_file in "${REQUIRED_ANDROID_FILES[@]}"; do
            if [ ! -f "$required_file" ]; then
              echo "Expected checked-in Android runtime file missing: $required_file" >&2
              exit 1
            fi
          done

          # Inject REQUEST_INSTALL_PACKAGES permission (required for sideloading APK updates on Android 8+)
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if ! grep -q "REQUEST_INSTALL_PACKAGES" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />|' "$MANIFEST"
            echo "✅ Injected REQUEST_INSTALL_PACKAGES permission"
          fi

          # Generate icons - MUST run after android init to overwrite default icons
          # Use android-icon.png (has black background) instead of icon.png (transparent, desktop-only)
          echo "📱 Generating app icons from src-tauri/icons/android-icon.png..."
          bun tauri icon src-tauri/icons/android-icon.png

          # Set dark background color for adaptive icon (instead of default white)
          echo "🎨 Setting dark icon background color..."
          COLORS_FILE="src-tauri/gen/android/app/src/main/res/values/colors.xml"
          if [ -f "$COLORS_FILE" ]; then
            # Replace the ic_launcher_background color with dark gray
            sed -i 's/#FFFFFF/#121212/g' "$COLORS_FILE"
            echo "✅ Updated icon background to dark (#121212)"
            cat "$COLORS_FILE"
          fi

          # Verify Android icons were generated correctly
          echo "✅ Verifying Android icon resources were generated..."
          if [ -d "src-tauri/gen/android/app/src/main/res/mipmap-hdpi" ]; then
            echo "Found mipmap directories:"
            ls -la src-tauri/gen/android/app/src/main/res/mipmap-*/
          else
            echo "⚠️ Warning: Android mipmap directories not found!"
          fi


          # Configure signing via gradle.properties (not CLI flags)
          GRADLE_PROPS="src-tauri/gen/android/gradle.properties"
          echo "" >> "$GRADLE_PROPS"
          echo "# Signing configuration" >> "$GRADLE_PROPS"
          echo "android.injected.signing.store.file=$KEYSTORE_PATH" >> "$GRADLE_PROPS"
          echo "android.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GRADLE_PROPS"
          echo "android.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GRADLE_PROPS"
          echo "android.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GRADLE_PROPS"

          # Build Universal APK (all architectures)
          bun tauri android build --apk true

          # Build ARM64-only APK (smaller, for modern devices)
          bun tauri android build --apk true --target aarch64

      - name: Rename Android APKs
        if: matrix.name == 'android'
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"

          echo "📦 All generated APKs:"
          find app/src-tauri/gen/android -name "*.apk" -type f

          # Rename Universal APK
          UNIVERSAL_DIR="app/src-tauri/gen/android/app/build/outputs/apk/universal/release"
          if [ -f "$UNIVERSAL_DIR/app-universal-release.apk" ]; then
            mv "$UNIVERSAL_DIR/app-universal-release.apk" "$UNIVERSAL_DIR/Zentrio_${VERSION}_android-universal.apk"
            echo "✅ Renamed Universal APK to Zentrio_${VERSION}_android-universal.apk"
          else
            echo "❌ Universal APK not found at expected path"
            exit 1
          fi

          # Find and rename ARM64 APK — Tauri may output to arm64/, aarch64/, or arm64-v8a/
          ARM64_APK=$(find app/src-tauri/gen/android/app/build/outputs/apk \
            -name "*.apk" -path "*/release/*" \
            ! -path "*/universal/*" \
            | head -1)

          if [ -n "$ARM64_APK" ]; then
            ARM64_DIR=$(dirname "$ARM64_APK")
            mv "$ARM64_APK" "$ARM64_DIR/Zentrio_${VERSION}_android-arm64.apk"
            echo "✅ Renamed ARM64 APK (was: $ARM64_APK)"
          else
            echo "❌ ARM64 APK not found in any non-universal output directory"
            exit 1
          fi

      - name: Upload Android Artifacts to Release
        if: matrix.name == 'android'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          fail_on_unmatched_files: true
          files: |
            app/src-tauri/gen/android/app/build/outputs/apk/**/Zentrio_*.apk

      # iOS Build
      - name: Build iOS
        if: matrix.name == 'ios'
        working-directory: ./app
        run: |
          bun tauri ios init

          # Aggressively patch generated project to disable all signing
          PBXPROJ="src-tauri/gen/apple/zentrio.xcodeproj/project.pbxproj"

          # Force Manual signing style
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PBXPROJ"

          # Set DEVELOPMENT_TEAM to empty string for all occurrences
          sed -i '' 's/DEVELOPMENT_TEAM = "[^"]*";/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"

          # Set CODE_SIGNING_ALLOWED to NO
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"

          # Add CODE_SIGNING_ALLOWED = NO if not present (append to build settings)
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual; CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"

          # Build with all signing disabled
          bun tauri ios build --export-method debugging -- \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Upload iOS Artifacts to Release
        if: matrix.name == 'ios'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            app/src-tauri/gen/apple/build/Release-iphoneos/*.app
            app/src-tauri/gen/apple/build/Release-iphoneos/*.ipa
