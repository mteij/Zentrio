name: Quality Check

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    outputs:
      eslint_errors: ${{ steps.eslint.outputs.errors }}
      eslint_warnings: ${{ steps.eslint.outputs.warnings }}
      ts_errors: ${{ steps.typecheck.outputs.errors }}
      tests_passed: ${{ steps.tests.outputs.passed }}
      server_build_ok: ${{ steps.server_build.outputs.ok }}
      rustfmt_ok: ${{ steps.rustfmt.outputs.fmt_ok }}
      clippy_errors: ${{ steps.clippy.outputs.errors }}
      clippy_warnings: ${{ steps.clippy.outputs.warnings }}
      knip_unused_files: ${{ steps.knip.outputs.unused_files }}
      score: ${{ steps.score.outputs.score }}
      grade: ${{ steps.score.outputs.grade }}
      status: ${{ steps.score.outputs.status }}
      color: ${{ steps.score.outputs.color }}
      critical: ${{ steps.score.outputs.critical }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: cd app && bun install

      # ── TypeScript ──────────────────────────────────────────────────────────
      - name: Type Check
        id: typecheck
        run: |
          set +e
          cd app
          tsc_out=$(bun run type-check 2>&1)
          echo "$tsc_out"
          # Count error lines (lines containing "error TS")
          err_count=$(echo "$tsc_out" | grep -c "error TS" || true)
          err_count=$(echo "$err_count" | tr -d '\n' | head -1)
          echo "errors=$err_count" >> "$GITHUB_OUTPUT"
          echo "📊 TypeScript: $err_count error(s)"

      # ── ESLint ──────────────────────────────────────────────────────────────
      - name: Lint (ESLint)
        id: eslint
        run: |
          set +e
          cd app
          # Run ESLint with JSON format, capture output – never fail the step
          eslint_json=$(bun run lint -- --format json 2>/dev/null || true)

          # Fall back: if JSON is empty/invalid, run plain and count manually
          if echo "$eslint_json" | node -e "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))" 2>/dev/null; then
            errors=$(echo "$eslint_json" | node -e "
              const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.log(d.reduce((s,f)=>s+f.errorCount,0));
            ")
            warnings=$(echo "$eslint_json" | node -e "
              const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.log(d.reduce((s,f)=>s+f.warningCount,0));
            ")
          else
            # Plain text fallback
            plain_out=$(bun run lint 2>&1 || true)
            echo "$plain_out"
            errors=$(echo "$plain_out" | grep -c "error" | head -1 || echo "0")
            warnings=$(echo "$plain_out" | grep -c "warning" | head -1 || echo "0")
          fi

          # Sanitize counts
          errors=$(echo "${errors:-0}" | tr -d '\n' | head -1)
          warnings=$(echo "${warnings:-0}" | tr -d '\n' | head -1)

          echo "errors=${errors}" >> "$GITHUB_OUTPUT"
          echo "warnings=${warnings}" >> "$GITHUB_OUTPUT"
          echo "📊 ESLint: ${errors} error(s), ${warnings} warning(s)"

      # ── Dead Code (Knip) ────────────────────────────────────────────────────
      - name: Dead Code (knip)
        id: knip
        run: |
          set +e
          cd app
          knip_out=$(bun run knip --reporter json 2>/dev/null || echo '{}')
          unused_files=$(echo "$knip_out" | node -e "
            try {
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.log((d.files || []).length);
            } catch(e) { console.log(0); }
          " || echo "0")
          unused_files=$(echo "${unused_files:-0}" | tr -d '\n' | head -1)
          echo "unused_files=${unused_files}" >> "$GITHUB_OUTPUT"
          echo "📊 Knip: ${unused_files} unused file(s)"

      # ── Unit Tests ──────────────────────────────────────────────────────────
      - name: Unit Tests
        id: tests
        run: |
          set +e
          cd app
          bun run test
          exit_code=$?
          if [ $exit_code -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Tests passed"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "📊 Tests failed (score will be affected)"
          fi

      # ── Server Build ────────────────────────────────────────────────────────
      - name: Build Server Binary (Linux host)
        id: server_build
        run: |
          set +e
          cd app
          bun build src/index.ts --compile --target bun-linux-x64 --outfile src-tauri/bin/zentrio-server-x86_64-unknown-linux-gnu
          exit_code=$?
          if [ $exit_code -eq 0 ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Server build passed"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Server build failed (score will be affected)"
          fi

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Rust Formatting
        id: rustfmt
        run: |
          set +e
          cd app/src-tauri
          cargo fmt -- --check
          fmt_exit=$?
          if [ $fmt_exit -eq 0 ]; then
            echo "fmt_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ Rust formatting OK"
          else
            echo "fmt_ok=false" >> "$GITHUB_OUTPUT"
            echo "📊 Rust formatting issues found (score will be affected)"
          fi

      - name: Rust Linting (Clippy)
        id: clippy
        run: |
          set +e
          cd app/src-tauri
          # Use -W warnings so warnings are reported but don't fail
          clippy_out=$(cargo clippy -- -W warnings 2>&1)
          echo "$clippy_out"
          warn_count=$(echo "$clippy_out" | grep -c "^warning" | head -1 || echo "0")
          err_count=$(echo "$clippy_out" | grep -c "^error" | head -1 || echo "0")
          # Sanitize to ensure single integer values
          warn_count=$(echo "$warn_count" | tr -d '\n' | head -1)
          err_count=$(echo "$err_count" | tr -d '\n' | head -1)
          echo "warnings=${warn_count}" >> "$GITHUB_OUTPUT"
          echo "errors=${err_count}" >> "$GITHUB_OUTPUT"
          echo "📊 Clippy: ${err_count} error(s), ${warn_count} warning(s)"

      # ── Score ───────────────────────────────────────────────────────────────
      - name: Calculate Quality Score
        id: score
        if: always()
        run: |
          # Inputs (default to 0 if not available)
          export TS_ERRORS="${{ steps.typecheck.outputs.errors || '0' }}"
          export ESLINT_ERRORS="${{ steps.eslint.outputs.errors || '0' }}"
          export ESLINT_WARNINGS="${{ steps.eslint.outputs.warnings || '0' }}"
          export TESTS_PASSED="${{ steps.tests.outputs.passed || 'false' }}"
          export SERVER_BUILD_OK="${{ steps.server_build.outputs.ok || 'false' }}"
          export KNIP_UNUSED="${{ steps.knip.outputs.unused_files || '0' }}"
          export CLIPPY_ERRORS="${{ steps.clippy.outputs.errors || '0' }}"
          export CLIPPY_WARNINGS="${{ steps.clippy.outputs.warnings || '0' }}"
          export RUSTFMT_OK="${{ steps.rustfmt.outputs.fmt_ok || 'false' }}"

          # Scoring (100 points, deductions):
          #   TypeScript errors:   -10 per error (max -50)
          #   TypeScript warnings: -2 per warning (max -20)
          #   ESLint errors:       -10 per error (max -50)
          #   ESLint warnings:     -3 per warning (max -30)
          #   Tests failed:        -25
          #   Server build failed: -25
          #   Unused files (knip): -3 per file (max -15)
          #   Rust fmt issues:     -10
          #   Clippy errors:       -10 per error (max -30)
          #   Clippy warnings:     -3 per warning (max -20)

          python3 - <<'PYEOF'
          import os, math

          ts_err   = int(os.environ.get('TS_ERRORS', '0'))
          esl_err  = int(os.environ.get('ESLINT_ERRORS', '0'))
          esl_warn = int(os.environ.get('ESLINT_WARNINGS', '0'))
          tests_ok = os.environ.get('TESTS_PASSED', 'false') == 'true'
          build_ok = os.environ.get('SERVER_BUILD_OK', 'false') == 'true'
          knip_files = int(os.environ.get('KNIP_UNUSED', '0'))
          clip_err = int(os.environ.get('CLIPPY_ERRORS', '0'))
          clip_w   = int(os.environ.get('CLIPPY_WARNINGS', '0'))
          rustfmt_ok = os.environ.get('RUSTFMT_OK', 'false') == 'true'

          score = 100
          score -= min(ts_err   * 10, 50)
          score -= min(esl_err  * 10, 50)
          score -= min(esl_warn * 3,  30)
          if not tests_ok:
              score -= 25
          if not build_ok:
              score -= 25
          score -= min(knip_files * 3, 15)
          if not rustfmt_ok:
              score -= 10
          score -= min(clip_err * 10, 30)
          score -= min(clip_w   * 3,  20)

          score = max(0, score)
          critical_failures = (
              ts_err > 0
              or esl_err > 0
              or clip_err > 0
              or not tests_ok
              or not build_ok
          )

          if critical_failures:
              grade, status, color = "Failing", "Failing", "red"
          elif score >= 90:
              grade, status, color = "A", "Passing", "brightgreen"
          elif score >= 80:
              grade, status, color = "B", "Passing", "green"
          elif score >= 70:
              grade, status, color = "C", "Needs attention", "yellowgreen"
          elif score >= 60:
              grade, status, color = "D", "Needs attention", "yellow"
          elif score >= 40:
              grade, status, color = "E", "Needs attention", "orange"
          else:
              grade, status, color = "F", "Needs attention", "red"

          print(f"Score: {score}/100  Grade: {grade}  Status: {status}  Color: {color}")

          # Write to GITHUB_OUTPUT
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"score={score}\n")
              fh.write(f"grade={grade}\n")
              fh.write(f"status={status}\n")
              fh.write(f"color={color}\n")
              fh.write(f"critical={'true' if critical_failures else 'false'}\n")
          PYEOF

      - name: Save quality metrics
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .github/badges
          cat > .github/badges/quality-metrics.json << 'EOF'
          {
            "score": "${{ steps.score.outputs.score }}",
            "grade": "${{ steps.score.outputs.grade }}",
            "status": "${{ steps.score.outputs.status }}",
            "color": "${{ steps.score.outputs.color }}",
            "critical": "${{ steps.score.outputs.critical }}",
            "ts_errors": "${{ steps.typecheck.outputs.errors }}",
            "eslint_errors": "${{ steps.eslint.outputs.errors }}",
            "eslint_warnings": "${{ steps.eslint.outputs.warnings }}",
            "tests_passed": "${{ steps.tests.outputs.passed }}",
            "server_build_ok": "${{ steps.server_build.outputs.ok }}",
            "knip_unused_files": "${{ steps.knip.outputs.unused_files }}",
            "rustfmt_ok": "${{ steps.rustfmt.outputs.fmt_ok }}",
            "clippy_errors": "${{ steps.clippy.outputs.errors }}",
            "clippy_warnings": "${{ steps.clippy.outputs.warnings }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF
          cat .github/badges/quality-metrics.json

      - name: Upload quality metrics artifact
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: quality-metrics
          path: .github/badges/quality-metrics.json
          retention-days: 1
          overwrite: true

      - name: Print score summary
        if: always()
        run: |
          echo "## 📊 Quality Score" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Score** | **${{ steps.score.outputs.score }}/100** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | **${{ steps.score.outputs.status }}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Grade** | **${{ steps.score.outputs.grade }}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical failure | ${{ steps.score.outputs.critical == 'true' && 'yes' || 'no' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TypeScript errors | ${{ steps.typecheck.outputs.errors }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ESLint errors | ${{ steps.eslint.outputs.errors }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ESLint warnings | ${{ steps.eslint.outputs.warnings }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ steps.tests.outputs.passed == 'true' && '✅ passed' || '❌ failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server build | ${{ steps.server_build.outputs.ok == 'true' && 'passed' || 'failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unused files (knip) | ${{ steps.knip.outputs.unused_files }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rust fmt | ${{ steps.rustfmt.outputs.fmt_ok == 'true' && '✅ OK' || '❌ issues' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clippy errors | ${{ steps.clippy.outputs.errors }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clippy warnings | ${{ steps.clippy.outputs.warnings }} |" >> "$GITHUB_STEP_SUMMARY"
