name: Update Quality Badge

on:
  workflow_run:
    workflows: ["Quality Check"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-badge:
    name: Update Badge
    runs-on: ubuntu-latest
    # Only run if the quality workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history for proper git operations
          fetch-depth: 0

      - name: Download quality metrics artifact
        uses: actions/download-artifact@v4
        with:
          name: quality-metrics
          path: ./metrics
          # Download from the triggering workflow run
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Read metrics and generate badge
        id: generate
        run: |
          mkdir -p .github/badges

          # Default values
          SCORE="0"
          GRADE="?"
          COLOR="lightgrey"

          # If we have the metrics file, use it
          if [ -f ./metrics/quality-metrics.json ]; then
            echo "Found metrics file, reading values..."
            METRICS=$(cat ./metrics/quality-metrics.json)
            echo "$METRICS"
            SCORE=$(echo "$METRICS" | jq -r '.score // 0')
            GRADE=$(echo "$METRICS" | jq -r '.grade // "?"')
            COLOR=$(echo "$METRICS" | jq -r '.color // "lightgrey"')
          else
            echo "No metrics file found, using defaults"
          fi

          export SCORE
          export GRADE
          export COLOR

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Update Gist with badge data
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 92598bd8ebd40beb60c71b870c3933d7
          filename: zentrio-quality-badge.json
          label: code quality
          message: ${{ steps.generate.outputs.score }}/100 (${{ steps.generate.outputs.grade }})
          color: ${{ steps.generate.outputs.color }}
